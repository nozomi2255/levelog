name: Release macOS

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: macOS ${{ matrix.arch }}
    runs-on: macos-latest
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: apple-silicon
            target: aarch64-apple-darwin
          - arch: intel
            target: x86_64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate source and version
        run: |
          pnpm check:release
          pnpm audit:public
          pnpm notices:generate
          pnpm lint
          pnpm test
          cargo test --locked --manifest-path src-tauri/Cargo.toml

      - name: Require Tauri updater signing secrets
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          LEVELOG_UPDATER_PUBLIC_KEY: ${{ secrets.LEVELOG_UPDATER_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          for name in TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD LEVELOG_UPDATER_PUBLIC_KEY; do
            if [[ -z "${!name}" ]]; then
              echo "Required release secret is missing: $name" >&2
              exit 1
            fi
          done

      - name: Generate Tauri release config
        env:
          LEVELOG_UPDATER_PUBLIC_KEY: ${{ secrets.LEVELOG_UPDATER_PUBLIC_KEY }}
          LEVELOG_UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest.json
        run: |
          node scripts/generate-release-config.mjs \
            --base src-tauri/tauri.release.conf.json \
            --output src-tauri/target/release-config/tauri.generated.conf.json

      - name: Build and publish ad-hoc DMG plus signed updater artifacts
        uses: tauri-apps/tauri-action@2d793bf2c8c505b9b76211601b09aab48922225d # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          LEVELOG_UPDATER_PUBLIC_KEY: ${{ secrets.LEVELOG_UPDATER_PUBLIC_KEY }}
          LEVELOG_UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest.json
          LEVELOG_MACOS_DISTRIBUTION_MODE: ad-hoc
        with:
          tagName: v__VERSION__
          releaseName: Levelog v__VERSION__
          releaseBody: |
            ## macOS security notice

            This release is **ad-hoc signed and not Apple-notarized**. macOS may require you to approve Levelog in System Settings → Privacy & Security before its first launch.

            Download only from this GitHub Release. `SHA256SUMS.txt` is provided for download-integrity comparison; it does **not** authenticate the publisher. In-app updates are separately verified with Levelog's Tauri updater signature.
          generateReleaseNotes: true
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          args: --config src-tauri/target/release-config/tauri.generated.conf.json --target ${{ matrix.target }}

      - name: Verify updater artifact signature against configured public key
        env:
          LEVELOG_UPDATER_PUBLIC_KEY: ${{ secrets.LEVELOG_UPDATER_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          # cargo test changes the integration test's working directory to src-tauri,
          # so pass absolute artifact paths across the process boundary.
          bundle_dir="$GITHUB_WORKSPACE/src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          archives=("$bundle_dir"/*.app.tar.gz)
          signatures=("$bundle_dir"/*.app.tar.gz.sig)
          if [[ "${#archives[@]}" -ne 1 ]]; then
            echo "Expected exactly one updater archive for ${{ matrix.arch }}, found ${#archives[@]}" >&2
            exit 1
          fi
          if [[ "${#signatures[@]}" -ne 1 || "${signatures[0]}" != "${archives[0]}.sig" ]]; then
            echo "Expected exactly one matching updater signature for ${{ matrix.arch }}" >&2
            exit 1
          fi
          LEVELOG_VERIFY_UPDATE_ARCHIVE="${archives[0]}" \
          LEVELOG_VERIFY_UPDATE_SIGNATURE="${signatures[0]}" \
          LEVELOG_VERIFY_UPDATE_PUBLIC_KEY="$LEVELOG_UPDATER_PUBLIC_KEY" \
            cargo test --locked --manifest-path src-tauri/Cargo.toml \
              --test verify_update_artifact \
              release_update_archive_matches_configured_public_key \
              -- --ignored --exact

  publish-release:
    name: Verify and publish complete release
    needs: publish
    runs-on: macos-latest
    steps:
      - name: Checkout release verifier
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install verifier dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate bundled third-party notices
        run: pnpm notices:generate

      - name: Verify both architectures and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LEVELOG_UPDATER_PUBLIC_KEY: ${{ secrets.LEVELOG_UPDATER_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          release_tmp=$(mktemp -d)
          trap 'rm -rf "$release_tmp"' EXIT

          release_pages=$(gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/releases?per_page=100" --slurp)
          release_matches=$(jq -c --arg tag "$GITHUB_REF_NAME" \
            '[.[][] | select(.tag_name == $tag)]' <<< "$release_pages")
          release_count=$(jq 'length' <<< "$release_matches")
          if [[ "$release_count" -ne 1 ]]; then
            echo "Expected exactly one Release for $GITHUB_REF_NAME, found $release_count" >&2
            exit 1
          fi
          jq -c '.[0]' <<< "$release_matches" > "$release_tmp/release.json"

          gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --pattern '*.dmg' \
            --pattern '*.app.tar.gz' \
            --pattern '*.app.tar.gz.sig' \
            --pattern latest.json \
            --dir "$release_tmp"

          node scripts/verify-release-assets.mjs \
            --release-json "$release_tmp/release.json" \
            --latest-json "$release_tmp/latest.json" \
            --assets-dir "$release_tmp" \
            --repository "$GITHUB_REPOSITORY" \
            --tag "$GITHUB_REF_NAME" \
            --commit "$GITHUB_SHA" \
            --checksum-output "$release_tmp/SHA256SUMS.txt"

          shopt -s nullglob
          updater_archives=("$release_tmp"/*.app.tar.gz)
          for archive in "${updater_archives[@]}"; do
            LEVELOG_VERIFY_UPDATE_ARCHIVE="$archive" \
            LEVELOG_VERIFY_UPDATE_SIGNATURE="$archive.sig" \
            LEVELOG_VERIFY_UPDATE_PUBLIC_KEY="$LEVELOG_UPDATER_PUBLIC_KEY" \
              cargo test --locked --manifest-path src-tauri/Cargo.toml \
                --test verify_update_artifact \
                release_update_archive_matches_configured_public_key \
                -- --ignored --exact
          done

          gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" "$release_tmp/SHA256SUMS.txt" --clobber

          release_id=$(jq -r '.id' "$release_tmp/release.json")
          gh api --method PATCH "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
            -F draft=false \
            -f make_latest=true \
            --silent
