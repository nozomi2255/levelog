name: Release macOS

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: macOS ${{ matrix.arch }}
    runs-on: macos-latest
    environment: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: apple-silicon
            target: aarch64-apple-darwin
          - arch: intel
            target: x86_64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@d15e628ca66d93ee5f352c71671a7bc6a97af5c9 # v6.0.8

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate source and version
        run: |
          pnpm check:release
          pnpm audit:public
          pnpm notices:generate
          pnpm lint
          pnpm test
          cargo test --locked --manifest-path src-tauri/Cargo.toml

      - name: Require Tauri updater signing secrets
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          LEVELOG_UPDATER_PUBLIC_KEY: ${{ secrets.LEVELOG_UPDATER_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          for name in TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD LEVELOG_UPDATER_PUBLIC_KEY; do
            if [[ -z "${!name}" ]]; then
              echo "Required release secret is missing: $name" >&2
              exit 1
            fi
          done

      - name: Generate Tauri release config
        env:
          LEVELOG_UPDATER_PUBLIC_KEY: ${{ secrets.LEVELOG_UPDATER_PUBLIC_KEY }}
          LEVELOG_UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest.json
        run: |
          node scripts/generate-release-config.mjs \
            --base src-tauri/tauri.release.conf.json \
            --output src-tauri/target/release-config/tauri.generated.conf.json

      - name: Build and publish ad-hoc DMG plus signed updater artifacts
        uses: tauri-apps/tauri-action@2d793bf2c8c505b9b76211601b09aab48922225d # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          LEVELOG_UPDATER_PUBLIC_KEY: ${{ secrets.LEVELOG_UPDATER_PUBLIC_KEY }}
          LEVELOG_UPDATER_ENDPOINT: https://github.com/${{ github.repository }}/releases/latest/download/latest.json
          LEVELOG_MACOS_DISTRIBUTION_MODE: ad-hoc
        with:
          tagName: v__VERSION__
          releaseName: Levelog v__VERSION__
          releaseBody: |
            ## macOS security notice

            This release is **ad-hoc signed and not Apple-notarized**. macOS may require you to approve Levelog in System Settings → Privacy & Security before its first launch.

            Download only from this GitHub Release. `SHA256SUMS.txt` is provided for download-integrity comparison; it does **not** authenticate the publisher. In-app updates are separately verified with Levelog's Tauri updater signature.
          generateReleaseNotes: true
          releaseDraft: true
          prerelease: false
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true
          args: --config src-tauri/target/release-config/tauri.generated.conf.json --target ${{ matrix.target }}

      - name: Verify updater artifact signature against configured public key
        env:
          LEVELOG_UPDATER_PUBLIC_KEY: ${{ secrets.LEVELOG_UPDATER_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          # cargo test changes the integration test's working directory to src-tauri,
          # so pass absolute artifact paths across the process boundary.
          bundle_dir="$GITHUB_WORKSPACE/src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          archives=("$bundle_dir"/*.app.tar.gz)
          signatures=("$bundle_dir"/*.app.tar.gz.sig)
          if [[ "${#archives[@]}" -ne 1 ]]; then
            echo "Expected exactly one updater archive for ${{ matrix.arch }}, found ${#archives[@]}" >&2
            exit 1
          fi
          if [[ "${#signatures[@]}" -ne 1 || "${signatures[0]}" != "${archives[0]}.sig" ]]; then
            echo "Expected exactly one matching updater signature for ${{ matrix.arch }}" >&2
            exit 1
          fi
          LEVELOG_VERIFY_UPDATE_ARCHIVE="${archives[0]}" \
          LEVELOG_VERIFY_UPDATE_SIGNATURE="${signatures[0]}" \
          LEVELOG_VERIFY_UPDATE_PUBLIC_KEY="$LEVELOG_UPDATER_PUBLIC_KEY" \
            cargo test --locked --manifest-path src-tauri/Cargo.toml \
              --test verify_update_artifact \
              release_update_archive_matches_configured_public_key \
              -- --ignored --exact

  publish-release:
    name: Verify and publish complete release
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Verify both architectures and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          release_json=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}")
          if [[ "$(jq -r '.draft' <<< "$release_json")" != "true" ]]; then
            echo "Release must remain a draft until verification completes" >&2
            exit 1
          fi

          dmg_count=$(jq '[.assets[] | select(.name | endswith(".dmg"))] | length' <<< "$release_json")
          if [[ "$dmg_count" -ne 2 ]]; then
            echo "Expected exactly two DMG assets, found $dmg_count" >&2
            exit 1
          fi

          release_tmp=$(mktemp -d)
          trap 'rm -rf "$release_tmp"' EXIT
          gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            --pattern '*.dmg' \
            --pattern '*.app.tar.gz' \
            --pattern '*.app.tar.gz.sig' \
            --pattern latest.json \
            --dir "$release_tmp"

          shopt -s nullglob
          updater_archives=("$release_tmp"/*.app.tar.gz)
          updater_signatures=("$release_tmp"/*.app.tar.gz.sig)
          if [[ "${#updater_archives[@]}" -ne 2 || "${#updater_signatures[@]}" -ne 2 ]]; then
            echo "Expected exactly two updater archives and signatures" >&2
            exit 1
          fi

          expected_url_prefix="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/"
          verify_platform() {
            local platform="$1"
            local url signature asset_name signature_file signature_contents
            url=$(jq -er --arg platform "$platform" '.platforms[$platform].url' "$release_tmp/latest.json")
            signature=$(jq -er --arg platform "$platform" '.platforms[$platform].signature' "$release_tmp/latest.json")
            if [[ "$url" != "$expected_url_prefix"*.app.tar.gz ]]; then
              echo "Updater URL for $platform is outside the current repository/tag or is not an app archive" >&2
              exit 1
            fi
            asset_name="${url#"$expected_url_prefix"}"
            if [[ "$asset_name" == */* || ! -f "$release_tmp/$asset_name" ]]; then
              echo "Updater URL for $platform does not resolve to a downloaded release asset" >&2
              exit 1
            fi
            signature_file="$release_tmp/$asset_name.sig"
            if [[ ! -f "$signature_file" ]]; then
              echo "Updater signature asset for $platform is missing" >&2
              exit 1
            fi
            signature_contents=$(tr -d '\r\n' < "$signature_file")
            if [[ -z "$signature" || "$signature" != "$signature_contents" ]]; then
              echo "latest.json signature for $platform does not match its signature asset" >&2
              exit 1
            fi
            printf '%s\n' "$asset_name"
          }

          aarch64_asset=$(verify_platform darwin-aarch64)
          x86_64_asset=$(verify_platform darwin-x86_64)
          if [[ "$aarch64_asset" == "$x86_64_asset" ]]; then
            echo "Updater platforms must reference distinct archive assets" >&2
            exit 1
          fi

          dmg_files=("$release_tmp"/*.dmg)
          if [[ "${#dmg_files[@]}" -ne 2 ]]; then
            echo "Expected exactly two downloaded DMGs, found ${#dmg_files[@]}" >&2
            exit 1
          fi
          (
            cd "$release_tmp"
            shasum -a 256 -- *.dmg > SHA256SUMS.txt
          )
          checksum_lines=$(wc -l < "$release_tmp/SHA256SUMS.txt" | tr -d '[:space:]')
          if [[ "$checksum_lines" -ne 2 ]]; then
            echo "Expected exactly two SHA256SUMS.txt lines, found $checksum_lines" >&2
            exit 1
          fi
          if ! awk 'NF != 2 || $1 !~ /^[0-9a-f]{64}$/ { exit 1 }' "$release_tmp/SHA256SUMS.txt"; then
            echo "SHA256SUMS.txt has an invalid format" >&2
            exit 1
          fi
          gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" "$release_tmp/SHA256SUMS.txt" --clobber

          gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft=false --latest
